<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="./float-pane.js"></script>
    <title>Float Pane</title>
    <style>
      #float-pane {
        position: absolute;
        top: 50px;
        left: 50px;
        width: 200px;
        height: 100px;
        background-color: lightblue;
        border: 1px solid #ccc;
        padding: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        opacity: 0.8;
        z-index: 1;
      }
    </style>
  </head>

  <body>
    <main>
      <h2>Float Pane</h2>
      <section id="container"></section>
      <div id="float-pane">This is a floating pane</div>
    </main>
  </body>
</html>
